app:
  node:
    id: test-node
  datasource:
    core:
      xa-class-name: org.h2.jdbcx.JdbcDataSource
      url: jdbc:h2:mem:coredb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:
    property:
      xa-class-name: org.h2.jdbcx.JdbcDataSource
      url: jdbc:h2:mem:propertydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:
  jpa:
    ddl-auto: create-drop
    show-sql: false
    format-sql: false
    jdbc-time-zone: Europe/Moscow
    dialect: org.hibernate.dialect.H2Dialect

  jwt:
    secret: testSecretKeyForJwtGenerationMustBeLongEnough12345
    expiration-ms: 86400000

  messaging:
    rabbit:
      host: localhost
      amqp-port: 5672
      stomp-port: 61613
      username: guest
      password: guest
      virtual-host: /
    payment:
      queue: payment.processing
    consumer:
      enabled: false

  scheduler:
    enabled: false

